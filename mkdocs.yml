site_name: AI Tour
site_description: 研究地图 — agents, multimodal, LLM systems, generative models
site_url: https://caiyuanrui.github.io/ai-tour
repo_url: https://github.com/caiyuanrui/ai-tour
edit_uri: blob/main/docs/

theme:
  name: material
  icon:
    logo: material/book-open-page-variant
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - header.autohide
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 亮色模式
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 暗色模式

extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - def_list
  - tables

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Agents:
    - agents/index.md
    - Agent Architectures:
      - agents/architectures/index.md
      - "Day 1 — Survey": agents/architectures/2026-06-01-architectures.md
      - "Day 2 — ReAct": agents/architectures/2026-06-05-architectures.md
      - "Day 3 — ToT": agents/architectures/2026-06-08-architectures.md
      - "Day 4 — CodeAct": agents/architectures/2026-06-12-architectures.md
      - "Day 5 — Generative Agents": agents/architectures/2026-06-15-architectures.md
    - Tool Use:
      - agents/tool-use/index.md
      - "Day 1 — Toolformer": agents/tool-use/2026-06-19-tool-use.md
      - "Day 2 — AnyTool": agents/tool-use/2026-06-22-tool-use.md
  - Multimodal:
    - multimodal/index.md
    - VLM Pretraining:
      - multimodal/vlm-pretraining/index.md
      - "Day 1 — CLIP": multimodal/vlm-pretraining/2026-06-02-vlm-pretraining.md
      - "Day 2 — LLaVA": multimodal/vlm-pretraining/2026-06-09-vlm-pretraining.md
      - "Day 3 — SigLIP": multimodal/vlm-pretraining/2026-06-16-vlm-pretraining.md
      - "Day 4 — MM1": multimodal/vlm-pretraining/2026-06-23-vlm-pretraining.md
  - LLM Systems:
    - llm-systems/index.md
    - Inference Serving:
      - llm-systems/inference-serving/index.md
      - "Day 1 — Survey": llm-systems/inference-serving/2026-06-10-inference-serving.md
      - "Day 2 — DistServe": llm-systems/inference-serving/2026-06-17-inference-serving.md
      - "Day 3 — Speculative Decoding": llm-systems/inference-serving/2026-06-24-inference-serving.md
  - Generative Models:
    - generative-models/index.md
    - Diffusion Foundations:
      - generative-models/diffusion-foundations/index.md
      - "Day 1 — DDPM": generative-models/diffusion-foundations/2026-06-04-diffusion-foundations.md
      - "Day 2 — NCSN": generative-models/diffusion-foundations/2026-06-11-diffusion-foundations.md
      - "Day 3 — EDM": generative-models/diffusion-foundations/2026-06-18-diffusion-foundations.md
      - "Day 4 — LDM": generative-models/diffusion-foundations/2026-06-25-diffusion-foundations.md
    - Score-Based Models:
      - generative-models/score-models/index.md
  - Lab Reports:
    - lab-reports/index.md
    - Project Planning:
      - lab-reports/project-planning/index.md
      - "Week 1": lab-reports/2026-06-06-week-1-lab.md
      - "Day 2 — CogRouter": lab-reports/project-planning/2026-06-13-project-planning.md
      - "Day 3 — Token Economics": lab-reports/project-planning/2026-06-20-project-planning.md
    - Implementation Notes:
      - lab-reports/implementation-notes/index.md
  - Synthesis:
    - synthesis/index.md
    - Weekly:
      - "Week 1": synthesis/weekly/2026-06-07-weekly-synthesis.md
      - "Week 3": synthesis/weekly/2026-06-21-weekly-synthesis.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/caiyuanrui/ai-tour
    - icon: fontawesome/solid/book-open
      link: https://caiyuanrui.github.io/ai-tour
  generator: false
  analytics:
    provider: null

